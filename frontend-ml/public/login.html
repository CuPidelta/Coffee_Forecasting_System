<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Sales Demand Forecasting System</title>
    <link rel="stylesheet" href="login.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
    />
  </head>
  <body>
    <div class="page-bg">
      <div class="left-panel">
        <div class="left-brand">
          <div class="left-icon">
            <i class="ti ti-chart-line"></i>
          </div>
          <h1>
            Fuentes Company Sales Demand<br /><span class="accent"
              >Forecasting System
            </span>
          </h1>
          <p class="left-desc">
            Built for Fuentes Company to provide accurate sales demand forecasts
            for their products, enabling better inventory management and
            decision-making.
          </p>
        </div>
      </div>

      <div class="card card-login">
        <header class="card-header">
          <div class="sys-badge">
            <i class="ti ti-sparkles"></i>
            AI-Powered Analytics
          </div>
          <p class="subtitle">Sign in to access the forecasting engine</p>
        </header>

        <form id="login-form" novalidate>
          <div class="form-group">
            <label for="username">Username</label>
            <input
              type="text"
              id="username"
              placeholder="Enter your username"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              placeholder="Enter your password"
              required
            />
          </div>

          <button type="submit" id="login-btn">
            <i class="ti ti-login"></i>
            <span class="btn-text">Sign In</span>
            <span class="btn-loader" hidden>Signing in…</span>
          </button>
        </form>

        <div id="login-error-box" class="error-box" style="display: none">
          <i class="ti ti-alert-circle"></i>
          <span id="login-error-msg"></span>
        </div>

        <div class="divider"></div>
        <p class="footer-note">
          <i class="ti ti-lock"></i>
          Secured access — authorized users only
        </p>
      </div>
    </div>
    <script src="login.js"></script>
  </body>
</html>
