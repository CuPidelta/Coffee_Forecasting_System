<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coffee Shop Demand Forecaster</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page-bg">
      <div class="steam-wrap" aria-hidden="true">
        <span class="steam s1"></span>
        <span class="steam s2"></span>
        <span class="steam s3"></span>
      </div>

      <div class="card">
        <header class="card-header">
          <div class="cup-icon">☕</div>
          <h1>Sales Demand<br /><span class="accent">Forecaster</span></h1>
          <p class="subtitle">
            AI-powered prediction engine para sa iyong coffee shop
          </p>
        </header>

        <form id="prediction-form" novalidate>
          <div class="fields-grid">
            <div class="form-group">
              <label for="store_location">Store Location</label>
              <div class="select-wrap">
                <select id="store_location" required>
                  <option value="Lower Manhattan">Lower Manhattan</option>
                  <option value="Hell's Kitchen">Hell's Kitchen</option>
                  <option value="Astoria">Astoria</option>
                </select>
                <span class="chevron">▾</span>
              </div>
            </div>

            <div class="form-group">
              <label for="product_category">Product Category</label>
              <div class="select-wrap">
                <select id="product_category" required>
                  <option value="">— Pumili ng kategorya —</option>
                  <option value="Bakery">Bakery</option>
                  <option value="Branded">Branded</option>
                  <option value="Coffee">Coffee</option>
                  <option value="Coffee beans">Coffee Beans</option>
                  <option value="Drinking Chocolate">Drinking Chocolate</option>
                  <option value="Flavours">Flavours</option>
                  <option value="Loose Tea">Loose Tea</option>
                  <option value="Packaged Chocolate">Packaged Chocolate</option>
                  <option value="Tea">Tea</option>
                </select>
                <span class="chevron">▾</span>
              </div>
            </div>

            <div class="form-group">
              <label for="day_of_week">Araw ng Linggo</label>
              <div class="select-wrap">
                <select id="day_of_week" required>
                  <option value="0">Lunes (Monday)</option>
                  <option value="1">Martes (Tuesday)</option>
                  <option value="2">Miyerkules (Wednesday)</option>
                  <option value="3">Huwebes (Thursday)</option>
                  <option value="4">Biyernes (Friday)</option>
                  <option value="5">Sabado (Saturday)</option>
                  <option value="6">Linggo (Sunday)</option>
                </select>
                <span class="chevron">▾</span>
              </div>
            </div>

            <div class="form-group">
              <label for="month">Buwan</label>
              <div class="select-wrap">
                <select id="month" required>
                  <option value="1">Enero (January)</option>
                  <option value="2">Pebrero (February)</option>
                  <option value="3">Marso (March)</option>
                  <option value="4">Abril (April)</option>
                  <option value="5">Mayo (May)</option>
                  <option value="6">Hunyo (June)</option>
                </select>
                <span class="chevron">▾</span>
              </div>
            </div>

            <div class="form-group">
              <label for="hour"
                >Oras <span class="hint">(6 AM – 8 PM)</span></label
              >
              <input
                type="number"
                id="hour"
                min="6"
                max="20"
                value="8"
                required
              />
            </div>

            <div class="form-group">
              <label for="unit_price">
                Unit Price <span class="hint">(₱)</span>
              </label>
              <input
                type="number"
                id="unit_price"
                step="0.01"
                placeholder="Pumili ng kategorya muna"
                disabled
              />
              <div id="price-hint" class="price-hint" hidden></div>
            </div>
          </div>

          <button type="submit" id="predict-btn">
            <span class="btn-text">Hulaan ang Kabuuang Benta</span>
            <span class="btn-loader" hidden>Nag-aanalisa…</span>
          </button>
        </form>

        <div id="result-box" class="result-box" hidden>
          <div class="result-label">Inaasahang Kabuuang Benta</div>
          <div id="predicted-value" class="result-value">₱0.00</div>
          <div class="result-note">Batay sa iyong mga piniling kondisyon</div>
        </div>

        <div id="error-box" class="error-box" hidden>
          <span>⚠️</span>
          <span id="error-msg">Nagkaroon ng error sa pag-predict.</span>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
